<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>충주상업고 | AI Prompt Studio V4.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #030712; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .ai-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #d946ef 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: 700; }
        .tab-inactive { color: #94a3b8; }
        .chip { cursor: pointer; transition: all 0.2s; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); }
        .chip:hover { background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; transform: translateY(-1px); }
        textarea, input, select { background: rgba(0, 0, 0, 0.2) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .template-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .template-card:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); transform: translateY(-4px); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 상단 헤더 -->
    <header class="h-16 glass flex items-center justify-between px-6 z-50 shrink-0">
        <div class="flex items-center gap-6">
            <div class="text-xl font-bold ai-gradient tracking-tighter">CJCH AI STUDIO</div>
            <nav class="flex space-x-6 h-16">
                <button onclick="switchTab('builder')" id="btn-builder" class="tab-active h-full flex items-center gap-2 text-sm px-2 transition-all">
                    <i class="fas fa-magic"></i> 프롬프트 빌더
                </button>
                <button onclick="switchTab('templates')" id="btn-templates" class="tab-inactive h-full flex items-center gap-2 text-sm px-2 transition-all">
                    <i class="fas fa-lightbulb"></i> 추천 템플릿
                </button>
                <button onclick="switchTab('guide')" id="btn-guide" class="tab-inactive h-full flex items-center gap-2 text-sm px-2 transition-all">
                    <i class="fas fa-book-open"></i> 사용 가이드
                </button>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="resetAll()" class="text-slate-400 hover:text-red-400 text-xs flex items-center gap-1 transition">
                <i class="fas fa-redo"></i> 초기화
            </button>
            <button class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-full text-xs font-bold transition">학생 로그인</button>
        </div>
    </header>

    <!-- 메인 빌더 뷰 -->
    <main id="view-builder" class="flex flex-1 overflow-hidden">
        <!-- 왼쪽: 옵션 선택창 -->
