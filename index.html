<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>충주상업고등학교 AI Studio — 수업 콘텐츠 생성기 V14.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #020617;
    --surface: #0f172a;
    --surface-light: #1e293b;
    --border: rgba(255,255,255,0.1);
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --preview-hi: #60a5fa;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Noto Sans KR', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 72px; background: rgba(15, 23, 42, 0.95);
    border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); z-index: 200; flex-shrink: 0;
  }
  .logo-wrap { display: flex; align-items: center; gap: 1rem; }
  .logo-text { font-size: 1.3rem; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; }
  .nav-tabs { display: flex; gap: 0.5rem; margin-left: 2rem; }
  .nav-tab {
    padding: 0.5rem 1.2rem; border-radius: 20px; cursor: pointer;
    font-weight: 700; font-size: 0.85rem; transition: 0.2s; color: var(--text-muted);
  }
  .nav-tab.active { background: var(--accent); color: white; }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .dev-info { font-size: 0.75rem; text-align: right; color: var(--text-muted); border-right: 1px solid var(--border); padding-right: 1rem; line-height: 1.4; }
  .dev-info strong { color: var(--accent); }

  .workspace { display: grid; grid-template-columns: 1fr 480px; flex: 1; height: calc(100vh - 72px); overflow: hidden; }
  .builder { overflow-y: auto; padding: 2rem; background: var(--bg); }
  .editor { border-left: 1px solid var(--border); background: #000; display: flex; flex-direction: column; }

  .step-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.2rem; }
  .step-block.active { border-color: var(--accent); border-left: 5px solid var(--accent); }
  .step-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; }
  .step-num { font-family: 'DM Mono'; font-size: 0.7rem; background: var(--accent); color: white; padding: 2px 8px; border-radius: 4px; }
  .step-title { font-size: 1rem; font-weight: 800; color: var(--preview-hi); }
  .sub-title { font-size: 0.65rem; color: #64748b; font-weight: 800; text-transform: uppercase; margin: 15px 0 8px 5px; border-left: 2px solid #334155; padding-left: 8px; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    cursor: pointer; font-size: 0.75rem; font-weight: 600; padding: 8px 12px;
    border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface-light); color: var(--text-muted); transition: 0.15s;
  }
  .tag:hover { border-color: var(--accent); color: white; transform: translateY(-1px); }
  .tag.on { background: var(--accent) !important; color: white !important; border-color: var(--accent); }

  .count-tags { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
  .tag-cnt { padding: 8px 0; text-align: center; font-family: 'DM Mono'; font-size: 0.8rem; }

  .yt-input-wrap { display: flex; gap: 0.5rem; margin: 1rem 0; }
  .yt-input { flex: 1; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; font-size: 0.85rem; }
  .yt-add-btn { padding: 0 20px; background: #ef4444; color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; }
  .yt-add-btn:hover { background: #dc2626; }
  .yt-list { margin-bottom: 1rem; }
  .yt-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #1e1b4b; border-radius: 6px; margin-top: 0.5rem; font-size: 0.75rem; word-break: break-all; }
  .yt-remove-btn { background: none; border: none; color: #f87171; cursor: pointer; font-weight: bold; padding: 0 8px; transition: 0.2s; }
  .yt-remove-btn:hover { color: #dc2626; }

  .prompt-preview { flex: 1; overflow-y: auto; padding: 1.5rem; }
  .prompt-section { margin-bottom: 0.8rem; border: 1px solid #1e293b; border-radius: 8px; background: rgba(15,23,42,0.5); }
  .prompt-label { font-family: 'DM Mono'; font-size: 0.6rem; padding: 6px 12px; color: #475569; border-bottom: 1px solid #1e293b; text-transform: uppercase; }
  .prompt-content { padding: 12px; font-family: 'DM Mono'; font-size: 0.85rem; color: var(--preview-hi); white-space: pre-wrap; line-height: 1.6; }

  .topic-area { padding: 1.5rem; background: #000; border-top: 1px solid var(--border); }
  textarea.topic-input { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 1rem; color: white; outline: none; min-height: 110px; font-size: 1rem; }
